# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    root /www/wwwroot/mc/dist;
    index index.html;

    # SSL 证书（使用 Certbot 申请后自动填充，或手动指定）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 20m;

    # 错误页配置
    error_page 404 /404.html;

    # Let's Encrypt 验证
    location ~ \.well-known {
        allow all;
    }

    # 禁止访问敏感文件
    location ~ ^/(\.|LICENSE|README) {
        return 404;
    }

    # ===== 后端 API 代理 =====
    # MC 材质资源（优先级最高）
    location /mc/ {
        proxy_pass http://127.0.0.1:8080/mc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 用户端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 管理端 API
    location ^~ /prod-api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ===== 前端路由 =====
    # 管理后台
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 用户端
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 上传文件访问（/profile/ → 文件存储目录）
    location ^~ /profile/ {
        alias /data/mc/upload/;
        autoindex off;
    }

    # ===== 静态资源缓存 =====
    location ~* \.(gif|jpg|jpeg|png|bmp|ico)$ {
        expires 30d;
        access_log off;
    }

    location ~* \.(js|css)$ {
        expires 12h;
        access_log off;
    }

    # 日志
    access_log /var/log/nginx/mc.access.log;
    error_log  /var/log/nginx/mc.error.log;
}
